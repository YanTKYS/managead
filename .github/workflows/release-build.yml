name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true
        type: string

env:
  RUNTIME_IDENTIFIER: win-x64

permissions:
  contents: write

jobs:
  release-build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Extract release title/note from docs/release/release-note.md
        id: notes
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          $content = Get-Content docs/release/release-note.md -Raw
          $pattern = "(?s)##\s+$([regex]::Escape($version))\s*\r?\n###\s+Title\s*\r?\n(?<title>.*?)\r?\n\r?\n###\s+Note\s*\r?\n(?<note>.*?)(\r?\n##\s+v|$)"
          $m = [regex]::Match($content, $pattern)
          if (-not $m.Success) { throw "release-note.md に $version の記載がありません" }
          $title = $m.Groups['title'].Value.Trim()
          $note = $m.Groups['note'].Value.Trim()
          $normalizedVersion = $version -replace "^v", ""

          "title=$title" >> $env:GITHUB_OUTPUT
          "normalized_version=$normalizedVersion" >> $env:GITHUB_OUTPUT
          "package_dir=ManageAdTool-$version" >> $env:GITHUB_OUTPUT
          "archive_name=ManageAdTool-$version.zip" >> $env:GITHUB_OUTPUT
          "note<<EOF" >> $env:GITHUB_OUTPUT
          $note >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore ManageAdTool.csproj -r ${{ env.RUNTIME_IDENTIFIER }}

      - name: Build Release with Version
        run: dotnet build ManageAdTool.csproj -c Release -r ${{ env.RUNTIME_IDENTIFIER }} -p:Version=${{ steps.notes.outputs.normalized_version }} --no-restore

      - name: Prepare clean release package directory
        shell: pwsh
        run: |
          Remove-Item artifacts -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path "artifacts/package/${{ steps.notes.outputs.package_dir }}" -Force | Out-Null

      - name: Publish self-contained Release
        run: dotnet publish ManageAdTool.csproj -c Release -r ${{ env.RUNTIME_IDENTIFIER }} --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=None -p:DebugSymbols=false -p:Version=${{ steps.notes.outputs.normalized_version }} -o "artifacts/package/${{ steps.notes.outputs.package_dir }}" --no-restore

      - name: Add release docs and sample configs
        shell: pwsh
        run: |
          $packageRoot = "artifacts/package/${{ steps.notes.outputs.package_dir }}"
          Copy-Item README.md $packageRoot/README.md -Force
          Copy-Item appsettings.json $packageRoot/appsettings.json -Force
          Copy-Item config-samples $packageRoot/config-samples -Recurse -Force
          Copy-Item docs $packageRoot/docs -Recurse -Force

      - name: Verify release package contents
        shell: pwsh
        run: |
          $packageRoot = "artifacts/package/${{ steps.notes.outputs.package_dir }}"
          $requiredPaths = @(
            "ManageAdTool.exe",
            "appsettings.json",
            "README.md",
            "config-samples",
            "docs",
            "docs/README.md",
            "docs/operation/user-manual.md",
            "docs/operation/admin-manual.md",
            "docs/operation/troubleshooting.md",
            "docs/operation/validation-readonly.md",
            "docs/operation/validation-auth.md",
            "docs/operation/validation-user-edit.md",
            "docs/operation/validation-computer-edit.md",
            "docs/operation/validation-group-edit.md",
            "docs/operation/validation-gpo-simulation.md",
            "docs/operation/validation-operation-support.md",
            "docs/operation/validation-log-viewer.md",
            "docs/planning/roadmap.md",
            "docs/planning/backlog.md",
            "docs/planning/completed-work.md",
            "docs/release/release-note.md",
            "config-samples/appsettings.InMemory.sample.json",
            "config-samples/appsettings.DirectoryReadOnly.sample.json",
            "config-samples/appsettings.UserAttributeEdit.sample.json",
            "config-samples/appsettings.ComputerDescriptionEdit.sample.json",
            "config-samples/appsettings.GroupMembershipEdit.sample.json"
          )
          foreach ($relativePath in $requiredPaths) {
            $fullPath = Join-Path $packageRoot $relativePath
            if (-not (Test-Path $fullPath)) { throw "Release package missing required path: $relativePath" }
          }

          $rootDlls = Get-ChildItem $packageRoot -File -Filter "*.dll"
          if ($rootDlls.Count -gt 0) { throw "Release package root contains DLL files: $($rootDlls.Name -join ', ')" }

      - name: Create ZIP artifact
        shell: pwsh
        run: |
          Compress-Archive -Path "artifacts/package/${{ steps.notes.outputs.package_dir }}" -DestinationPath artifacts/${{ steps.notes.outputs.archive_name }} -Force

      - name: Upload ZIP Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.notes.outputs.archive_name }}
          path: artifacts/${{ steps.notes.outputs.archive_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ steps.notes.outputs.title }}
          body: ${{ steps.notes.outputs.note }}
          files: artifacts/${{ steps.notes.outputs.archive_name }}
